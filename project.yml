name: Glotty
# `knownRegions` exposes the localizations Xcode should respect.
# Without zh-Hans here, the .xcstrings catalog's Chinese column
# would be ignored at build time even though the JSON contains it.
# The in-app System Language picker (Settings → Profile → Language)
# overrides AppleLanguages at launch so the user can switch UI
# language regardless of macOS's setting.
options:
  bundleIdPrefix: com.ruojunye
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  createIntermediateGroups: true
  knownRegions: [en, zh-Hans, zh-Hant, ja, ko, es, fr, de]

# Build configurations. Release-AppStore = Mac App Store variant
# (release-type; sandbox entitlements + the `MAS` compile flag are
# applied per-target below). Web builds (Debug/Release) are unchanged.
configs:
  Debug: debug
  Release: release
  Release-AppStore: release

settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    # Universal binary so the notarized .pkg runs on both Apple Silicon
    # and Intel Macs (macOS 26 / Tahoe is the last Intel-supporting
    # release; Xcode 26 still builds x86_64). Rosetta only translates
    # x86→arm, so an arm64-only build would NOT launch on Intel at all.
    ARCHS: "arm64 x86_64"
  configs:
    # Local dev: only build the active arch (arm64 here) for speed.
    Debug:
      ONLY_ACTIVE_ARCH: YES
    # Release (the CD / notarized .pkg path): build the full fat binary.
    Release:
      ONLY_ACTIVE_ARCH: NO
    # MAS archive: full fat binary too.
    Release-AppStore:
      ONLY_ACTIVE_ARCH: NO

targets:
  Glotty:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Glotty
        # Referenced only via INFOPLIST_FILE in the MAS config — keep it out
        # of Compile Sources / Copy Resources for every target.
        excludes:
          - Info-MAS.plist
          - Info-Web.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ruojunye.glotty
        GENERATE_INFOPLIST_FILE: YES
        # Partial Info.plist carrying CFBundleDocumentTypes (registers Glotty as
        # an EPUB opener → Finder "Open With"). Xcode merges the generated
        # INFOPLIST_KEY_* keys into it. The MAS config overrides INFOPLIST_FILE
        # with its own hand-written plist below.
        INFOPLIST_FILE: Glotty/Info-Web.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Agent app — no Dock icon at idle. Required for popup panels to
        # receive IME candidates when overlaying another app's full-screen
        # space; see doc/ime-fullscreen-issue.md. Settings/Mistake-type
        # windows flip the policy back to .regular while open via
        # AppActivation.
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSAccessibilityUsageDescription: "Glotty reads selected text from the focused application so it can be translated."
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026"
        # App Store category — determines which section Glotty
        # appears in. Productivity fits a translation/writing tool;
        # alternatives: Reference, Utilities, Education.
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        # User-facing version (e.g. "1.0") and build number (e.g. "1").
        # App Store submissions require both. The Dev ID DMG pipeline
        # also picks these up — make-dmg-signed.sh stamps the version
        # into the output filename.
        MARKETING_VERSION: "1.0.9"
        CURRENT_PROJECT_VERSION: "14"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""
      configs:
        # Mac App Store variant. Sandbox entitlements satisfy MAS; the
        # `MAS` compile flag makes `#if MAS` select the App-Store-safe
        # impls (Services instead of AX/event-tap). See project memory
        # for the 2.4.5 rejection rationale.
        Release-AppStore:
          CODE_SIGN_ENTITLEMENTS: Glotty/Glotty-AppStore.entitlements
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) MAS"
          # NSServices is an array-of-dicts → can't be expressed via
          # INFOPLIST_KEY_*. MAS uses a hand-written plist; web keeps
          # auto-generating its own (GENERATE_INFOPLIST_FILE stays YES there).
          GENERATE_INFOPLIST_FILE: NO
          INFOPLIST_FILE: Glotty/Info-MAS.plist

  # Sandbox build for exercising destructive features (backup
  # import/export) in a fully isolated environment. Different bundle
  # id → separate UserDefaults domain + Keychain service; the
  # AppIdentity-derived support folder (Glotty-lab/) keeps its data
  # files separate from the real install too. Same sources as Glotty.
  GlottyLab:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Glotty
        # Referenced only via INFOPLIST_FILE in the MAS config — keep it out
        # of Compile Sources / Copy Resources for every target.
        excludes:
          - Info-MAS.plist
          - Info-Web.plist
    settings:
      base:
        PRODUCT_NAME: GlottyLab
        PRODUCT_BUNDLE_IDENTIFIER: com.ruojunye.glotty.lab
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Glotty Lab"
        INFOPLIST_KEY_NSAccessibilityUsageDescription: "Glotty Lab reads selected text from the focused application so it can be translated."
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""

  GlottyTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests/GlottyTests
    dependencies:
      - target: Glotty
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ruojunye.glotty.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Glotty.app/Contents/MacOS/Glotty"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""

schemes:
  Glotty:
    build:
      targets:
        Glotty: all
        GlottyTests: [test]
    test:
      targets:
        - GlottyTests
      gatherCoverageData: true
  GlottyLab:
    build:
      targets:
        GlottyLab: all
    run:
      config: Debug
  # Mac App Store build. Pick this scheme in Xcode (or
  # `xcodebuild -scheme Glotty-AppStore`) to build the sandboxed,
  # MAS-flagged variant. Test action stays on Debug.
  Glotty-AppStore:
    build:
      targets:
        Glotty: all
    run:
      config: Release-AppStore
    profile:
      config: Release-AppStore
    analyze:
      config: Release-AppStore
    archive:
      config: Release-AppStore
    test:
      config: Debug
      targets:
        - GlottyTests
